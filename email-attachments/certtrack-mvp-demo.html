.kpi-card.ok::before { background: var(--forest-500); }
.kpi-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-400);
  margin-bottom: 0.5rem;
}
.kpi-value {
  font-family: 'Fraunces', serif;
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--forest-800);
  line-height: 1;
  letter-spacing: -0.02em;
}
.kpi-card.alert .kpi-value { color: var(--terra-600); }
.kpi-sub {
  font-size: 0.78rem;
  color: var(--ink-400);
  margin-top: 0.4rem;
}

/* ============================================================
   STATUS BADGES
   ============================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.22rem 0.6rem;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}
.badge-ok { background: rgba(45, 94, 69, 0.12); color: var(--forest-600); }
.badge-ok .badge-dot { background: var(--forest-500); }
.badge-watch { background: rgba(184, 151, 42, 0.15); color: var(--gold-600); }
.badge-watch .badge-dot { background: var(--gold-500); }
.badge-alert { background: rgba(192, 123, 91, 0.18); color: var(--terra-700); }
.badge-alert .badge-dot { background: var(--terra-500); }
.badge-critical { background: rgba(179, 77, 44, 0.18); color: #7a2f15; }
.badge-critical .badge-dot { background: #b34d2c; }
.badge-expired { background: var(--forest-800); color: var(--cream-100); }
.badge-expired .badge-dot { background: var(--cream-200); }

/* ============================================================
   CERTIF LIST TABLE
   ============================================================ */
.cert-list {
  background: var(--cream-50);
  border: 1px solid var(--cream-300);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.cert-list-header {
  display: grid;
  grid-template-columns: 2.4fr 1fr 1.4fr 1fr 90px;
  gap: 1rem;
  padding: 0.9rem 1.4rem;
  background: var(--cream-100);
  border-bottom: 1px solid var(--cream-300);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-400);
  font-weight: 500;
}
.cert-row {
  display: grid;
  grid-template-columns: 2.4fr 1fr 1.4fr 1fr 90px;
  gap: 1rem;
  padding: 1rem 1.4rem;
  align-items: center;
  border-bottom: 1px solid var(--cream-200);
  transition: background 0.15s;
  cursor: pointer;
}
.cert-row:last-child { border-bottom: none; }
.cert-row:hover { background: var(--cream-100); }
.cert-row-name {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}
.cert-row-name .primary {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  color: var(--forest-800);
  font-weight: 500;
}
.cert-row-name .secondary {
  font-size: 0.78rem;
  color: var(--ink-400);
}
.cert-row-org {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--ink-700);
}
.cert-row-expiry {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  font-size: 0.85rem;
}
.cert-row-expiry .date {
  font-family: 'JetBrains Mono', monospace;
  color: var(--forest-800);
  font-weight: 500;
}
.cert-row-expiry .countdown {
  font-size: 0.72rem;
  color: var(--ink-400);
}
.cert-row-actions {
  display: flex;
  justify-content: flex-end;
}

/* ============================================================
   PROGRESS BAR — J-90 to J-0
   ============================================================ */
.progress-section {
  background: var(--cream-50);
  border: 1px solid var(--cream-300);
  border-radius: var(--radius-xl);
  padding: 2rem;
  margin-bottom: 2rem;
}
.progress-track {
  position: relative;
  height: 8px;
  background: var(--cream-200);
  border-radius: 999px;
  margin: 1.8rem 0 1.2rem;
  overflow: visible;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--forest-500), var(--gold-500), var(--terra-500));
  border-radius: 999px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.progress-fill::after {
  content: "";
  position: absolute;
  right: -6px;
  top: -4px;
  width: 16px;
  height: 16px;
  background: var(--gold-500);
  border-radius: 50%;
  border: 3px solid var(--cream-50);
  box-shadow: 0 2px 8px rgba(184, 151, 42, 0.4);
}
.progress-milestones {
  display: flex;
  justify-content: space-between;
  position: relative;
  margin-top: -1.2rem;
}
.milestone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  position: relative;
  z-index: 2;
}
.milestone-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--cream-50);
  border: 2px solid var(--cream-300);
  margin-top: -19px;
}
.milestone.done .milestone-dot {
  background: var(--forest-500);
  border-color: var(--forest-500);
}
.milestone.current .milestone-dot {
  background: var(--gold-500);
  border-color: var(--gold-500);
  box-shadow: 0 0 0 4px rgba(184, 151, 42, 0.2);
}
.milestone-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--ink-700);
  letter-spacing: 0.05em;
}
.milestone-date {
  font-size: 0.7rem;
  color: var(--ink-400);
  font-family: 'JetBrains Mono', monospace;
}

/* Phase steps below progress bar */
.phases {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-top: 2rem;
}
.phase-card {
  padding: 1rem 1.2rem;
  background: var(--cream-100);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--cream-300);
}
.phase-card.done { border-left-color: var(--forest-500); background: rgba(45, 94, 69, 0.05); }
.phase-card.current { border-left-color: var(--gold-500); background: rgba(184, 151, 42, 0.05); }
.phase-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-400);
  margin-bottom: 0.3rem;
}
.phase-title {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--forest-800);
  margin-bottom: 0.5rem;
}
.phase-tasks {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.phase-task {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  font-size: 0.82rem;
  color: var(--ink-700);
  cursor: pointer;
  padding: 0.25rem 0;
  user-select: none;
}
.phase-task input {
  margin: 3px 0 0;
  accent-color: var(--gold-500);
  cursor: pointer;
}
.phase-task.done {
  color: var(--ink-400);
  text-decoration: line-through;
  text-decoration-color: var(--gold-500);
}

/* ============================================================
   CERT DETAIL · meta grid
   ============================================================ */
.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.detail-title-block { display: flex; flex-direction: column; gap: 0.5rem; }
.detail-title-block h1 { font-size: 2.4rem; }
.detail-title-block .subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--ink-500);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.detail-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

.detail-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 1.5rem;
  margin-bottom: 2rem;
}
@media (max-width: 900px) {
  .detail-grid { grid-template-columns: 1fr; }
}

.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  background: var(--cream-50);
  border: 1px solid var(--cream-300);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.meta-cell {
  padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--cream-200);
  border-right: 1px solid var(--cream-200);
}
.meta-cell:nth-child(2n) { border-right: none; }
.meta-cell:nth-last-child(-n+2) { border-bottom: none; }
.meta-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-400);
  margin-bottom: 0.3rem;
}
.meta-value {
  font-size: 0.95rem;
  color: var(--forest-800);
  font-weight: 500;
}
.meta-value-large {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  color: var(--forest-800);
  letter-spacing: -0.01em;
}

/* ============================================================
   QR CODE PANEL
   ============================================================ */
.qr-panel {
  background: var(--forest-800);
  color: var(--cream-100);
  border-radius: var(--radius-xl);
  padding: 1.6rem;
  text-align: center;
  position: sticky;
  top: 5rem;
}
.qr-panel h3 {
  color: var(--cream-50);
  font-size: 1.05rem;
  margin-bottom: 0.3rem;
}
.qr-panel .qr-sub {
  font-size: 0.78rem;
  color: rgba(250, 246, 239, 0.6);
  margin-bottom: 1.2rem;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.qr-canvas-wrap {
  background: var(--cream-50);
  border-radius: var(--radius-md);
  padding: 1rem;
  margin: 0 auto 1rem;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-canvas-wrap canvas, .qr-canvas-wrap img { width: 100% !important; height: auto !important; image-rendering: pixelated; }
.qr-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--gold-400);
  word-break: break-all;
  padding: 0.6rem 0.8rem;
  background: rgba(184, 151, 42, 0.08);
  border-radius: var(--radius-sm);
  margin-bottom: 0.8rem;
}

/* ============================================================
   FORMS
   ============================================================ */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.2rem;
  background: var(--cream-50);
  border: 1px solid var(--cream-300);
  border-radius: var(--radius-lg);
  padding: 2rem;
}
.form-grid.full { grid-template-columns: 1fr; }
.form-field { display: flex; flex-direction: column; gap: 0.4rem; }
.form-field.span-2 { grid-column: 1 / -1; }
.form-field label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-500);
  font-weight: 600;
}
.form-field input,
.form-field select,
.form-field textarea {
  padding: 0.7rem 0.9rem;
  background: var(--cream-50);
  border: 1px solid var(--cream-300);
  border-radius: var(--radius-md);
  color: var(--forest-800);
  font-size: 0.95rem;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-field input:focus,
.form-field select:focus,
.form-field textarea:focus {
  outline: none;
  border-color: var(--gold-500);
  box-shadow: 0 0 0 3px rgba(184, 151, 42, 0.15);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-actions {
  grid-column: 1 / -1;
  display: flex;
  gap: 0.6rem;
  justify-content: flex-end;
  margin-top: 0.4rem;
  padding-top: 1.2rem;
  border-top: 1px solid var(--cream-200);
}

/* ============================================================
   RISK CALC PANEL
   ============================================================ */
.risk-panel {
  background: linear-gradient(135deg, var(--forest-800) 0%, var(--forest-700) 100%);
  color: var(--cream-100);
  border-radius: var(--radius-xl);
  padding: 1.6rem;
}
.risk-panel h3 {
  color: var(--cream-50);
  font-family: 'Fraunces', serif;
  font-size: 1.15rem;
  margin-bottom: 1rem;
}
.risk-breakdown {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  margin-bottom: 1rem;
}
.risk-line {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid rgba(250, 246, 239, 0.08);
  font-size: 0.88rem;
}
.risk-line:last-child { border-bottom: none; }
.risk-line .lbl { color: rgba(250, 246, 239, 0.7); }
.risk-line .val {
  font-family: 'JetBrains Mono', monospace;
  color: var(--cream-50);
  font-weight: 600;
}
.risk-total {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(212, 179, 74, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.risk-total .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold-400);
}
.risk-total .val {
  font-family: 'Fraunces', serif;
  font-size: 1.7rem;
  color: var(--terra-400);
  font-weight: 600;
  letter-spacing: -0.01em;
}

/* ============================================================
   PUBLIC VERIFY PAGE
   ============================================================ */
body.public-mode {
  background: linear-gradient(180deg, var(--cream-100) 0%, var(--cream-200) 100%);
}
body.public-mode .app { display: block; }
body.public-mode .sidebar { display: none; }
body.public-mode .topbar { display: none; }
.public-wrap {
  max-width: 540px;
  margin: 0 auto;
  padding: 3rem 1.5rem 2rem;
  position: relative;
  z-index: 2;
}
.public-card {
  background: var(--cream-50);
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-xl);
  overflow: hidden;
  border: 1px solid var(--cream-300);
}
.public-header {
  background: var(--forest-800);
  color: var(--cream-100);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  gap: 0.9rem;
}
.public-header img {
  width: 44px;
  height: 44px;
  border-radius: 8px;
}
.public-header-text { line-height: 1.2; }
.public-header-text .brand {
  font-family: 'Fraunces', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--cream-50);
}
.public-header-text .by {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold-400);
  margin-top: 0.25rem;
}
.public-status-block {
  padding: 2.5rem 2rem 2rem;
  text-align: center;
  position: relative;
}
.public-status-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 1.2rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.public-status-icon.ok { background: rgba(45, 94, 69, 0.12); color: var(--forest-500); }
.public-status-icon.alert { background: rgba(192, 123, 91, 0.18); color: var(--terra-600); }
.public-status-icon.expired { background: var(--forest-800); color: var(--terra-400); }
.public-status-icon svg { width: 38px; height: 38px; stroke-width: 2; }
.public-status-title {
  font-family: 'Fraunces', serif;
  font-size: 1.6rem;
  color: var(--forest-800);
  margin-bottom: 0.4rem;
}
.public-status-sub {
  color: var(--ink-500);
  font-size: 0.95rem;
  max-width: 340px;
  margin: 0 auto 1.6rem;
  line-height: 1.5;
}
.public-meta {
  background: var(--cream-100);
  padding: 1.5rem 2rem;
  border-top: 1px solid var(--cream-300);
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}
.public-meta-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--cream-300);
}
.public-meta-row:last-child { border-bottom: none; padding-bottom: 0; }
.public-meta-row .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-400);
}
.public-meta-row .val {
  font-size: 0.95rem;
  color: var(--forest-800);
  font-weight: 500;
  text-align: right;
}
.public-footer {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-400);
  letter-spacing: 0.05em;
  padding: 1.5rem;
  margin-top: 1rem;
}
.public-footer a { color: var(--gold-600); }

/* ============================================================
   EMPTY STATES
   ============================================================ */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  background: var(--cream-50);
  border: 1px dashed var(--cream-400);
  border-radius: var(--radius-lg);
}
.empty-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 1rem;
  background: var(--cream-200);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-400);
}
.empty h3 { color: var(--forest-800); margin-bottom: 0.4rem; }
.empty p { color: var(--ink-500); margin-bottom: 1.2rem; }

/* ============================================================
   TOAST · NOTIFICATION
   ============================================================ */
#toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--forest-800);
  color: var(--cream-100);
  padding: 0.9rem 1.2rem;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  font-size: 0.9rem;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  border-left: 3px solid var(--gold-500);
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { border-left-color: var(--forest-500); }
#toast.error { border-left-color: var(--terra-500); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: relative;
    height: auto;
    flex-direction: row;
    align-items: center;
    padding: 1rem;
    overflow-x: auto;
    flex-wrap: wrap;
  }
  .sidebar-brand { padding-bottom: 0; border: none; }
  .nav-section { flex-direction: row; flex: 1; }
  .nav-section-title { display: none; }
  .sidebar-footer { display: none; }
  .content { padding: 1.5rem 1rem 4rem; }
  .topbar { padding: 1rem 1.5rem; }
  .cert-list-header,
  .cert-row {
    grid-template-columns: 1.6fr 1fr 70px;
    gap: 0.6rem;
  }
  .cert-list-header > *:nth-child(3),
  .cert-list-header > *:nth-child(4),
  .cert-row > *:nth-child(3),
  .cert-row > *:nth-child(4) { display: none; }
  .form-grid { grid-template-columns: 1fr; padding: 1.5rem; }
  .meta-grid { grid-template-columns: 1fr; }
  .meta-cell:nth-child(2n) { border-right: none; }
  .meta-cell { border-right: none; }
  .phases { grid-template-columns: 1fr; }
}
</style>

<!-- =============================================================
     STORAGE LAYER · Abstracted to swap with Supabase later
     Interface: async get(key), set(key, val), delete(key), list(prefix)
     ============================================================= -->
<script>
const Storage = (function() {
  const PREFIX = "certtrack:v1:";

  function fullKey(k) { return PREFIX + k; }

  return {
    async get(key) {
      try {
        const raw = localStorage.getItem(fullKey(key));
        return raw ? JSON.parse(raw) : null;
      } catch (e) { console.error(e); return null; }
    },
    async set(key, value) {
      try {
        localStorage.setItem(fullKey(key), JSON.stringify(value));
        return value;
      } catch (e) { console.error(e); return null; }
    },
    async delete(key) {
      try {
        localStorage.removeItem(fullKey(key));
        return true;
      } catch (e) { return false; }
    },
    async list(prefix = "") {
      const results = [];
      const fullPrefix = fullKey(prefix);
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(fullPrefix)) {
          try {
            const value = JSON.parse(localStorage.getItem(key));
            results.push({ key: key.slice(PREFIX.length), value });
          } catch(e) {}
        }
      }
      return results;
    },
    async clear() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(PREFIX)) keys.push(k);
      }
      keys.forEach(k => localStorage.removeItem(k));
    }
  };
})();

const Utils = {
  uid() { return 'c_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4); },
  daysBetween(d1, d2) {
    const ms = new Date(d2) - new Date(d1);
    return Math.round(ms / (1000 * 60 * 60 * 24));
  },
  daysUntil(date) { return this.daysBetween(new Date(), new Date(date)); },
  formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
  },
  formatEUR(n) {
    if (n == null || isNaN(n)) return '—';
    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
  },
  formatCountdown(days) {
    if (days < 0) return `expirée il y a ${Math.abs(days)} j`;
    if (days === 0) return 'expire aujourd\'hui';
    if (days < 30) return `dans ${days} j`;
    if (days < 365) return `dans ${Math.round(days / 30)} mois`;
    return `dans ${(days / 365).toFixed(1)} ans`;
  },
  toast(msg, kind = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + kind;
    setTimeout(() => el.className = '', 3000);
  },
  escape(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
};

// =============================================================
// APP STATE (in-memory cache, persisted via Storage)
// =============================================================
const App = {
  currentTenant: null,
  certs: [],
  tenants: [],

  async init() {
    // Seed data on first run
    const existing = await Storage.get('seeded');
    if (!existing) {
      await Storage.set('tenants', SEED.tenants);
      await Storage.set('certs', SEED.certs());
      await Storage.set('seeded', true);
    }
    this.tenants = await Storage.get('tenants') || [];
    this.certs = await Storage.get('certs') || [];

    // Restore tenant selection
    const savedTenant = await Storage.get('current_tenant');
    this.currentTenant = savedTenant || (this.tenants[0] && this.tenants[0].id);
    await Storage.set('current_tenant', this.currentTenant);
  },

  async setTenant(id) {
    this.currentTenant = id;
    await Storage.set('current_tenant', id);
    Router.refresh();
  },

  certsForTenant(tenantId = null) {
    const tid = tenantId || this.currentTenant;
    return this.certs.filter(c => c.tenant_id === tid);
  },

  certById(id) { return this.certs.find(c => c.id === id); },
  tenantById(id) { return this.tenants.find(t => t.id === id); },

  async saveCert(cert) {
    const idx = this.certs.findIndex(c => c.id === cert.id);
    if (idx >= 0) this.certs[idx] = cert;
    else this.certs.push(cert);
    await Storage.set('certs', this.certs);
  },

  async deleteCert(id) {
    this.certs = this.certs.filter(c => c.id !== id);
    await Storage.set('certs', this.certs);
  },

  async resetData() {
    await Storage.clear();
    await this.init();
  },

  // Compute KPIs for current tenant
  computeKPIs() {
    const certs = this.certsForTenant();
    const counts = { total: certs.length, ok: 0, watch: 0, alert: 0, critical: 0, expired: 0 };
    let nextDays = Infinity;
    let nextCert = null;
    certs.forEach(c => {
      const d = Utils.daysUntil(c.expiry_date);
      const s = Schema.statusFromDays(d);
      counts[s]++;
      if (d >= 0 && d < nextDays) { nextDays = d; nextCert = c; }
    });
    return { ...counts, nextDays: nextDays === Infinity ? null : nextDays, nextCert };
  }
};

// =============================================================
// RISK CALCULATOR · per-cert exposure
// =============================================================
const RiskCalc = {
  // Returns { blocked, recert, stock, penalty, total }
  compute(cert, monthlyRevenue, exposurePct) {
    const body = Schema.bodyById(cert.body_id);
    const blocked = monthlyRevenue * 3 * (exposurePct / 100); // 3 months blocked
    const recert = body.recertCost;
    const stock = monthlyRevenue * 0.15 * (exposurePct / 100); // 15% inventory loss
    const penalty = monthlyRevenue * 12 * 0.01 * (exposurePct / 100); // 1% annual revenue
    return { blocked, recert, stock, penalty, total: blocked + recert + stock + penalty };
  }
};

// ROUTER · hash-based
// =============================================================
const Router = {
  routes: {
    '': () => Views.dashboard(),
    'dashboard': () => Views.dashboard(),
    'certs': () => Views.certsList(),
    'cert/new': () => Views.certForm(null),
    'cert/edit': (id) => Views.certForm(id),
    'cert': (id) => Views.certDetail(id),
    'verify': (id) => Views.publicVerify(id),
    'reset': () => Views.reset(),
  },
  parse() {
    const hash = window.location.hash.slice(1).replace(/^\//, '');
    const parts = hash.split('/').filter(Boolean);
    return { route: parts[0] || '', param: parts[1] || null };
  },
  navigate(path) { window.location.hash = '#/' + path; },
  refresh() { this.handle(); },
  handle() {
    const { route, param } = this.parse();
    let key = route;
    if (route === 'cert' && param === 'new') key = 'cert/new';
    if (route === 'cert' && param && this.routes['cert/edit'] && window.location.hash.includes('edit')) key = 'cert/edit';
    // Check if we're on a public verify route
    if (route === 'verify') {
      document.body.classList.add('public-mode');
    } else {
      document.body.classList.remove('public-mode');
    }
    const handler = this.routes[key] || this.routes[route] || this.routes[''];
    handler(param);
  },
  init() {
    window.addEventListener('hashchange', () => this.handle());
    this.handle();
  }
};

// =============================================================
// VIEW · CERT DETAIL with J-90 → J-0 progress
// =============================================================
Views.certDetail = function(id) {
  const cert = App.certById(id);
  if (!cert) {
    Router.navigate('certs');
    return;
  }
  const body = Schema.bodyById(cert.body_id);
  const days = Utils.daysUntil(cert.expiry_date);
  const status = Schema.statusFromDays(days);
  const progress = PhaseTasks.computeProgress(cert);
  const currentPhase = PhaseTasks.currentPhase(days);
  const tenant = App.tenantById(App.currentTenant);

  // Public verify URL (real, hash-based, works offline)
  const verifyUrl = window.location.origin + window.location.pathname + '#/verify/' + cert.id;

  const milestones = [
    { label: 'J-90', days: 90 },
    { label: 'J-60', days: 60 },
    { label: 'J-30', days: 30 },
    { label: 'J-7', days: 7 },
    { label: 'J-0', days: 0 },
  ];

  // Compute progress bar fill based on time passed inside renewal window (J-90 → J-0)
  // Visual: J-90 is left (start), J-0 is right (end)
  let timeProgress = 0;
  if (days <= 90 && days >= 0) timeProgress = ((90 - days) / 90) * 100;
  else if (days < 0) timeProgress = 100;

  const content = `
    <div class="topbar">
      <div class="topbar-title">
        <a href="#/certs" style="color: var(--ink-400); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;">← TOUTES LES CERTIFS</a>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-small" id="btn-share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Copier lien public
        </button>
        <a class="btn btn-ghost btn-small" href="#/cert/${cert.id}/edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Modifier
        </a>
        <button class="btn btn-danger btn-small" id="btn-delete">
          Supprimer
        </button>
      </div>
    </div>

    <div class="content">
      <div class="detail-header">
        <div class="detail-title-block">
          <div class="subtitle">${Utils.escape(body.category)} · ${Utils.escape(body.name)}</div>
          <h1>${Utils.escape(cert.product_name)}</h1>
          <div style="display: flex; gap: 0.6rem; align-items: center; margin-top: 0.5rem;">
            <span class="badge badge-${status}">
              <span class="badge-dot"></span>
              ${Schema.statusLabel(status)}
            </span>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--ink-500);">
              ${Utils.formatCountdown(days)} · ${Utils.formatDate(cert.expiry_date)}
            </span>
          </div>
        </div>
      </div>

      <!-- PROGRESS BAR -->
      <div class="progress-section">
        <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.4rem;">
          <h2 style="font-size: 1.4rem;">Renouvellement · J-90 → J-0</h2>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--gold-600); font-weight: 600;">${progress}% complété</span>
        </div>
        <p style="color: var(--ink-500); font-size: 0.92rem; max-width: 540px;">Avancement combiné : tâches cochées + temps écoulé dans la fenêtre de renouvellement.</p>

        <div class="progress-track">
          <div class="progress-fill" style="width: ${Math.max(timeProgress, progress)}%"></div>
        </div>
        <div class="progress-milestones">
          ${milestones.map((m, idx) => {
            // A milestone is "done" when we've already passed it (current days <= milestone days)
            // The "current" milestone is the most recently passed one (the next one ahead in time, smaller days, hasn't been reached yet)
            let cls = '';
            if (days <= m.days) cls = 'done';
            // Mark the smallest "done" milestone as current (closest to expiry that we've passed)
            const nextMilestone = milestones[idx + 1];
            if (cls === 'done' && nextMilestone && days > nextMilestone.days) {
              cls = 'current';
            }
            return `
              <div class="milestone ${cls}">
                <span class="milestone-label">${m.label}</span>
                <div class="milestone-dot"></div>
              </div>
            `;
          }).join('')}
        </div>

        <!-- PHASES -->
        <div class="phases">
          ${[1, 2, 3].map(phaseNum => {
            const phase = PhaseTasks['phase' + phaseNum];
            const phaseCls = currentPhase > phaseNum ? 'done' : (currentPhase === phaseNum ? 'current' : '');
            return `
              <div class="phase-card ${phaseCls}">
                <div class="phase-num">PHASE ${phaseNum} · ${phase.range}</div>
                <div class="phase-title">${phase.label}</div>
                <ul class="phase-tasks">
                  ${phase.tasks.map(task => {
                    const done = (cert.tasks_done || []).includes(task.id);
                    return `
                      <li class="phase-task ${done ? 'done' : ''}" data-task-id="${task.id}" data-cert-id="${cert.id}">
                        <input type="checkbox" ${done ? 'checked' : ''} />
                        <span>${Utils.escape(task.label)}</span>
                      </li>
                    `;
                  }).join('')}
                </ul>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- META + QR + RISK -->
      <div class="detail-grid">
        <div>
          <h2 style="font-size: 1.3rem; margin-bottom: 1rem;">Détails</h2>
          <div class="meta-grid">
            <div class="meta-cell">
              <div class="meta-label">Numéro de certificat</div>
              <div class="meta-value">${Utils.escape(cert.cert_number || '—')}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Organisme</div>
              <div class="meta-value">${Utils.escape(body.name)} · ${Utils.escape(body.category)}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Date d'émission</div>
              <div class="meta-value">${Utils.formatDate(cert.issued_date)}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Date d'expiration</div>
              <div class="meta-value-large">${Utils.formatDate(cert.expiry_date)}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Validité du certificat</div>
              <div class="meta-value">${body.validityMonths} mois</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Délai de renouvellement</div>
              <div class="meta-value">${body.deadlineWeeks} semaines</div>
            </div>
            ${cert.notes ? `
              <div class="meta-cell" style="grid-column: 1 / -1;">
                <div class="meta-label">Notes internes</div>
                <div class="meta-value" style="font-weight: 400; line-height: 1.5; margin-top: 0.3rem;">${Utils.escape(cert.notes)}</div>
              </div>
            ` : ''}
          </div>

          <h2 style="font-size: 1.3rem; margin: 2rem 0 1rem;">Exposition au risque</h2>
          <div class="risk-panel">
            <h3>Si cette certification expirait sans renouvellement</h3>
            ${riskBreakdownHTML(cert, 50000, 60)}
            <p style="font-size: 0.7rem; color: rgba(250, 246, 239, 0.5); margin-top: 1rem; line-height: 1.4;">
              Estimation pour un CA mensuel de 50 000 € avec 60 % d'exposition. Modifiable dans le formulaire d'édition.
            </p>
          </div>
        </div>

        <div>
          <div class="qr-panel">
            <h3>QR de vérification publique</h3>
            <div class="qr-sub">Scannable par vos clients</div>
            <div class="qr-canvas-wrap" id="qrcode"></div>
            <div class="qr-link">${Utils.escape(verifyUrl)}</div>
            <button class="btn btn-gold btn-small" id="btn-open-public" style="width: 100%;">Aperçu page publique</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = appShell('certs', content);
  bindShell();

  // Generate QR code
  setTimeout(() => {
    try {
      const qr = qrcode(0, 'M');
      qr.addData(verifyUrl);
      qr.make();
      const wrap = document.getElementById('qrcode');
      if (wrap) wrap.innerHTML = qr.createImgTag(5, 0);
    } catch (e) { console.error('QR gen failed', e); }
  }, 50);

  // Bind task checkboxes
  document.querySelectorAll('.phase-task').forEach(taskEl => {
    taskEl.addEventListener('click', async (e) => {
      e.preventDefault();
      const tid = taskEl.dataset.taskId;
      const cid = taskEl.dataset.certId;
      const c = App.certById(cid);
      if (!c) return;
      c.tasks_done = c.tasks_done || [];
      const idx = c.tasks_done.indexOf(tid);
      if (idx >= 0) c.tasks_done.splice(idx, 1);
      else c.tasks_done.push(tid);
      await App.saveCert(c);
      Router.refresh();
    });
  });

  // Bind share button
  document.getElementById('btn-share')?.addEventListener('click', () => {
    navigator.clipboard?.writeText(verifyUrl).then(
      () => Utils.toast('Lien public copié dans le presse-papier', 'success'),
      () => Utils.toast('Impossible de copier le lien', 'error')
    );
  });

  // Bind public preview
  document.getElementById('btn-open-public')?.addEventListener('click', () => {
    Router.navigate('verify/' + cert.id);
  });

  // Bind delete
  document.getElementById('btn-delete')?.addEventListener('click', async () => {
    if (!confirm('Supprimer définitivement cette certification ?')) return;
    await App.deleteCert(cert.id);
    Utils.toast('Certification supprimée', 'success');
    Router.navigate('certs');
  });
};

  const r = RiskCalc.compute(cert, ca, expo);
  return `

      <div class="risk-line"><span class="lbl">CA bloqué (3 mois)</span><span class="val">${Utils.formatEUR(r.blocked)}</span></div>
      <div class="risk-line"><span class="lbl">Re-certification</span><span class="val">${Utils.formatEUR(r.recert)}</span></div>

// Custom router handling for /cert/:id/edit
const _origHandle = Router.handle.bind(Router);
Router.handle = function() {
  const hash = window.location.hash.slice(1).replace(/^\//, '');
  const parts = hash.split('/').filter(Boolean);

  // Public verify mode
  if (parts[0] === 'verify') {
    document.body.classList.add('public-mode');
    Views.publicVerify(parts[1]);
    return;
  } else {
    document.body.classList.remove('public-mode');
  }

  if (parts[0] === 'cert' && parts[1] === 'new') return Views.certForm(null);
  if (parts[0] === 'cert' && parts[1] && parts[2] === 'edit') return Views.certForm(parts[1]);
  if (parts[0] === 'cert' && parts[1]) return Views.certDetail(parts[1]);
  if (parts[0] === 'certs') return Views.certsList();
  if (parts[0] === 'reset') return Views.reset();

  Views.dashboard();
};

<script id="ct-demo-polish-js">
(function() {
  var CALENDLY_URL = 'https://calendly.com/contact-ethicaldataboost/certtrack_free_audit?utm_source=demo_mvp&utm_medium=referral&utm_campaign=none&utm_content=demo_dashboard_cta&month=2026-05';
  var injected = { selector: false, footer: false };

  // ---- INJECTION 1 : Badge "(exemple)" dans le selector tenant ----
  function patchTenantSelector() {
    var sel = document.getElementById('tenantSelect');
    if (!sel || sel.dataset.ctPatched === '1') return;
    // Apply only when the SPA has populated the options
    if (sel.options.length === 0) return;
    sel.dataset.ctPatched = '1';
    for (var i = 0; i < sel.options.length; i++) {
      var opt = sel.options[i];
      if (opt.text.indexOf('(exemple)') === -1) {
        opt.text = opt.text.trim() + '  (exemple)';
      }
    }
    // Add discrete meta line below the selector
    var wrapper = sel.closest('.tenant-switcher');
    if (wrapper && !wrapper.querySelector('.ct-demo-tenant-meta')) {
      var meta = document.createElement('div');
      meta.className = 'ct-demo-tenant-meta';
      meta.textContent = 'Données de démonstration';
      wrapper.appendChild(meta);
    }
  }

  // ---- INJECTION 2 : CTA Calendly contextuel en bas du dashboard ----
  function injectDashboardCTA() {
    // Only on the dashboard route
    if (location.hash && location.hash !== '#/dashboard' && location.hash !== '#/' && location.hash !== '') return;
    var main = document.querySelector('.main, main, #app .content, #content');
    if (!main) {
      // Fallback : chercher l'élément qui contient "À traiter en priorité"
      var allHeadings = document.querySelectorAll('h2, h1');
      for (var i = 0; i < allHeadings.length; i++) {
        if (allHeadings[i].textContent.indexOf('priorité') !== -1) {
          main = allHeadings[i].closest('.main, main, [class*="content"], [class*="container"]');
          if (main) break;
        }
      }
    }
    if (!main) return;
    if (main.querySelector('.ct-demo-cta')) return;
    var cta = document.createElement('div');
    cta.className = 'ct-demo-cta';
    cta.innerHTML = ''
      + '<div class="ct-demo-cta-content">'
      + '  <div class="ct-demo-cta-text">'
      + '    <span class="ct-demo-cta-eyebrow">Programme Fondateur · 5 places</span>'
      + '    <h3 class="ct-demo-cta-title">Vos vraies certifications ici, <em>opérationnel en 4 jours</em>.</h3>'
      + '    <p class="ct-demo-cta-sub">20 minutes en visio pour cartographier votre risque réel et vous montrer comment CertTrack s\'intègre à votre suivi actuel. Aucun engagement.</p>'
      + '  </div>'
      + '  <a href="' + CALENDLY_URL + '" target="_blank" rel="noopener" class="ct-demo-cta-btn">'
      + '    Réserver mon audit · 20 min'
      + '    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'
      + '  </a>'
      + '</div>';
    main.appendChild(cta);

    // Add footnote below the CTA
    var foot = document.createElement('div');
    foot.className = 'ct-demo-footnote';
    foot.textContent = 'Données fictives à des fins de démonstration · Tenant exemple : Nour Import (Importateur halal)';
    main.appendChild(foot);
  }

  // ---- BOOT ----
  function applyAll() {
    patchTenantSelector();
    injectDashboardCTA();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyAll);
  } else {
    applyAll();
  }
  // Re-run on SPA route changes
  window.addEventListener('hashchange', function() {
    setTimeout(applyAll, 100);
  });
  // Observe DOM changes from SPA renders
  var observer = new MutationObserver(function() {
    applyAll();
  });
  observer.observe(document.body, { childList: true, subtree: true });
  setTimeout(function() { observer.disconnect(); }, 15000);
})();
</script>
